spring:
  application:
    name: api-assinaturas

  datasource:
    url: jdbc:postgresql://localhost:5434/bd-assinaturas
    username: coti
    password: coti
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
